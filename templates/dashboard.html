<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Banque Sécurisée</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #e9ecef; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        .success-icon { color: #28a745; font-size: 50px; margin-bottom: 10px; }
        .btn-logout { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #dc3545; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="success-icon">✔</div>
        <h2>Connexion réussie !</h2>
        <p>Bienvenue sur votre espace bancaire, <strong>{{ username }}</strong>.</p>
        <hr>
        <p style="color: orange;">⚠️ Page en construction</p>
        <a href="/" class="btn-logout">Se déconnecter</a>
    </div>
</body>
</html>
