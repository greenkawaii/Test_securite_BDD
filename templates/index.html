<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Démo Sécurité SQL - Tabs</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        
        /* Conteneur principal */
        .tabs-container { width: 450px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }

        /* Barre d'onglets */
        .tabs-header { display: flex; background: #e9ecef; border-bottom: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 15px; border: none; cursor: pointer; background: none; font-weight: bold; color: #666; transition: 0.3s; }
        .tab-btn:hover { background: #dee2e6; }
        .tab-btn.active { background: white; color: #007bff; border-bottom: 3px solid #007bff; }

        /* Contenu des onglets */
        .tab-content { display: none; padding: 30px; }
        .tab-content.active { display: block; }

        /* Style des formulaires */
        h3 { margin-top: 0; color: #333; }
        p { color: #666; font-size: 0.9em; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; cursor: pointer; color: white; border: none; border-radius: 4px; font-weight: bold; margin-top: 10px; }
        
        .btn-vuln { background: #dc3545; }
        .btn-secure { background: #28a745; }
        
        .error { padding: 10px; border-radius: 4px; margin-top: 15px; font-size: 0.85em; }
        .error-red { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .error-green { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        .footer { margin-top: 20px; text-align: center; }
        .btn-link { background: none; color: #007bff; text-decoration: underline; border: none; cursor: pointer; width: auto; }
    </style>
</head>
<body>

    <h1>Mon Espace Bancaire</h1>

    <div class="tabs-container">
        <div class="tabs-header">
            <button class="tab-btn active" onclick="openTab(event, 'vulnerable')">Connexion Classique</button>
            <button class="tab-btn" onclick="openTab(event, 'secure')">Connexion Sécurisée</button>
        </div>

        <div id="vulnerable" class="tab-content active">
            <h3>Portail Standard</h3>
            <p>ℹ️ Cette version utilise une requête SQL vulnérable (concaténation).</p>
            <form action="/login_vulnerable" method="POST">
                <input type="text" name="username" placeholder="Nom d'utilisateur" required>
                <input type="password" name="password" placeholder="Mot de passe">
                <button type="submit" class="btn-vuln">Se connecter (Mode Vulnérable)</button>
            </form>
            {% if error %}
                <div class="error error-red">{{ error }}</div>
            {% endif %}
        </div>

        <div id="secure" class="tab-content">
            <h3>Portail Sécurisé</h3>
            <p>ℹ️ Cette version utilise des requêtes préparées pour bloquer les injections.</p>
            <form action="/login_secure" method="POST">
                <input type="text" name="username" placeholder="Nom d'utilisateur" required>
                <input type="password" name="password" placeholder="Mot de passe">
                <button type="submit" class="btn-secure">Se connecter (Mode Protégé)</button>
            </form>
            {% if error_secure %}
                <div class="error error-green">{{ error_secure }}</div>
            {% endif %}
        </div>
    </div>

    <div class="footer">
        <button class="btn-link" onclick="window.location.href='/inscription'">Créer un compte</button>
    </div>

    <script>
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            // Cache tout le contenu
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
                tabcontent[i].classList.remove("active");
            }
            // Enlève la classe "active" des boutons
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove("active");
            }
            // Affiche l'onglet actuel et ajoute la classe active au bouton
            document.getElementById(tabName).style.display = "block";
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // Garder l'onglet sécurisé ouvert si une erreur sécurisée revient
        {% if error_secure %}
            openTab({currentTarget: document.getElementsByClassName('tab-btn')[1]}, 'secure');
        {% endif %}
    </script>

</body>
</html>
